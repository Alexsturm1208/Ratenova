<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Planavo · Master Admin</title>
<link rel="icon" type="image/png" href="https://kdbuduwztmxxykfvqbie.supabase.co/storage/v1/object/public/public-assets/Plamavo%20Icon.png" sizes="32x32">
<style>
:root{
  --bg:#0F1117;--bgS:#161820;--bgC:#1C1E27;--bgH:#22242E;--bgE:#252836;
  --em:#34D399;--emD:#059669;--emG:rgba(52,211,153,0.08);--emG2:rgba(52,211,153,0.14);--ba:rgba(52,211,153,0.3);
  --am:#FBBF24;--amG:rgba(251,191,36,0.12);
  --co:#F97171;--coG:rgba(249,112,102,0.12);
  --t:#F1F5F9;--ts:#94A3B8;--tm:#64748B;
  --b:rgba(255,255,255,0.07);--bl:rgba(255,255,255,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px 24px}
::selection{background:var(--emG);color:var(--em)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:3px}
input,select,button{font-family:inherit}
input::placeholder{color:var(--tm)}
select option{background:var(--bgC);color:var(--t)}

.btn{padding:10px 20px;font-size:13px;font-weight:600;border-radius:10px;display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary{background:linear-gradient(135deg,var(--emD),var(--em));color:#fff;box-shadow:0 4px 16px rgba(52,211,153,0.22)}
.btn-ghost{background:var(--emG);color:var(--em);border:1px solid var(--ba)}
.btn-outline{background:transparent;color:var(--ts);border:1px solid var(--bl)}
.btn-danger{background:var(--coG);color:var(--co);border:1px solid rgba(249,112,102,0.2)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-full{width:100%;justify-content:center}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.iw{display:flex;align-items:center;background:var(--bgE);border:1px solid var(--b);border-radius:11px;padding:0 13px;transition:border-color .18s}
.iw:focus-within{border-color:var(--ba);box-shadow:0 0 0 3px var(--emG)}
.iw input,.iw select{flex:1;border:none;outline:none;padding:11px 0;font-size:14px;color:var(--t);background:transparent}

.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--b);background:var(--bgE);color:var(--ts);cursor:pointer;transition:all .18s}
.chip.active,.chip:hover{background:var(--emG);color:var(--em);border-color:var(--ba)}

.card{background:var(--bgC);border:1px solid var(--b);border-radius:16px;padding:18px}

#flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bgC);border:1px solid var(--ba);border-radius:14px;padding:11px 20px;font-size:13px;font-weight:600;color:var(--t);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#flash.show{transform:translateX(-50%) translateY(0)}

#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999}
.spinner{width:34px;height:34px;border:3px solid var(--b);border-top-color:var(--em);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

#topbar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--bgS);border:1px solid var(--b);border-radius:14px;margin-bottom:20px;display:none}
.shell{display:flex;gap:16px;align-items:flex-start;max-width:1100px;margin:0 auto}
.sidebar{width:190px;flex-shrink:0;background:var(--bgS);border:1px solid var(--b);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:3px;min-height:480px}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;border-radius:10px;font-size:13px;cursor:pointer;text-align:left;transition:all .15s;background:transparent;color:var(--tm);font-weight:400}
.nav-btn.active{background:var(--emG2);color:var(--em);font-weight:700}
.nav-btn:hover:not(.active){background:var(--bgH);color:var(--t)}

.user-item{cursor:pointer;padding:10px 11px;border-radius:11px;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px}
.user-item:hover{background:var(--bgH)}
.user-item.sel{background:var(--emG2);border-color:var(--ba)}
.avatar{border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}

.tog-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b)}
.tog-track{position:relative;width:44px;height:24px;border-radius:12px;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}

#confirmOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:9000}
#confirmOverlay.show{display:flex}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--tm)">Verbinde…</p>
</div>

<div id="flash"></div>

<div id="confirmOverlay">
  <div class="card" style="max-width:360px;width:90%">
    <p id="cMsg" style="font-size:15px;font-weight:700;margin:0 0 6px"></p>
    <p id="cSub" style="font-size:13px;color:var(--tm);margin:0 0 20px"></p>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-full" onclick="cResolve(false)">Abbrechen</button>
      <button id="cOkBtn" class="btn btn-danger btn-full" onclick="cResolve(true)">Bestätigen</button>
    </div>
  </div>
</div>

<div id="topbar">
  <svg width="96" height="24" viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="4" width="24" height="24" rx="6" fill="#052e16"/>
    <rect x="6" y="9" width="12" height="3" rx="1.5" fill="#6EE23A"/>
    <rect x="11" y="6" width="2" height="20" rx="1" fill="#B8962E"/>
    <rect x="6" y="15" width="12" height="3" rx="1.5" fill="#6EE23A"/>
    <rect x="6" y="21" width="8" height="3" rx="1.5" fill="#4CAF50" opacity="0.6"/>
    <text x="30" y="22" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="800" fill="#F1F5F9" letter-spacing="-0.5">Planavo</text>
  </svg>
  <span style="font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(134,232,192,0.12);color:#86E8C0;border:1px solid rgba(134,232,192,0.25);letter-spacing:1px">MASTER ADMIN</span>
  <span style="flex:1"></span>
  <span id="tbUser" style="font-size:12px;color:var(--tm)"></span>
  <button class="btn btn-outline btn-sm" onclick="masterLogout()">Logout</button>
</div>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────
const SB_URL  = "https://kdbuduwztmxxykfvqbie.supabase.co";
const SB_KEY  = "sb_publishable_ZZpjQ4Lqcqd2uVpGrSthcQ_nnCYSGPv";
// Zugang wird über role="master" in user_profiles geprüft

// ── State ─────────────────────────────────────────────────────────────────
let sb = null;
let st = { loggedIn:false, tab:"users", users:[], selId:null, query:"", delConfirm:null, err:"" };

// ── Utils ─────────────────────────────────────────────────────────────────
const esc = v => String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function flash(msg, dur=3000){
  const el=document.getElementById("flash");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(flash._t);
  flash._t=setTimeout(()=>el.classList.remove("show"),dur);
}

// ── Confirm ───────────────────────────────────────────────────────────────
let _cRes=null;
function confirm2(msg,sub="",okTxt="Bestätigen"){
  return new Promise(r=>{
    _cRes=r;
    document.getElementById("cMsg").textContent=msg;
    document.getElementById("cSub").textContent=sub;
    document.getElementById("cOkBtn").textContent=okTxt;
    document.getElementById("confirmOverlay").classList.add("show");
  });
}
function cResolve(v){ document.getElementById("confirmOverlay").classList.remove("show"); if(_cRes){_cRes(v);_cRes=null;} }

// ── Inactivity ────────────────────────────────────────────────────────────
let _it=null,_wt=null,_ci=null;
function resetInact(){
  if(!st.loggedIn) return;
  clearTimeout(_it);clearTimeout(_wt);clearInterval(_ci);
  const w=document.getElementById("inactWarn");if(w)w.remove();
  _wt=setTimeout(()=>{
    if(!st.loggedIn)return;
    const el=document.createElement("div");
    el.id="inactWarn";
    el.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9998;background:var(--bgC);border:1px solid rgba(251,191,36,0.4);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:slideUp .3s ease;white-space:nowrap";
    el.innerHTML=`<span style="font-size:20px">⏱</span><div style="flex:1"><p style="font-size:13px;font-weight:700;color:var(--am);margin:0">Sitzung läuft ab</p><p style="font-size:11px;color:var(--tm);margin:2px 0 0">Automatischer Logout in <span id="cdS" style="color:var(--am);font-weight:700">30</span> Sek.</p></div><button onclick="resetInact()" style="padding:7px 13px;border-radius:8px;border:1px solid rgba(251,191,36,0.4);background:var(--amG);color:var(--am);font-size:12px;font-weight:700;cursor:pointer">Aktiv bleiben</button>`;
    document.body.appendChild(el);
    let s=30;_ci=setInterval(()=>{s--;const cd=document.getElementById("cdS");if(cd)cd.textContent=s;if(s<=0)clearInterval(_ci);},1000);
  },4.5*60*1000);
  _it=setTimeout(async()=>{if(!st.loggedIn)return;flash("⏱ Automatisch ausgeloggt");await masterLogout();},5*60*1000);
}
["mousemove","mousedown","keydown","touchstart","scroll","click"].forEach(ev=>{
  document.addEventListener(ev,()=>{if(st.loggedIn)resetInact();},{passive:true});
});

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener("load",async()=>{
  if(!window.supabase){
    document.getElementById("loadingScreen").innerHTML=`<p style="color:var(--co);font-size:14px">⚠ Supabase konnte nicht geladen werden.<br><small>Bitte Internetverbindung prüfen und Seite neu laden.</small></p>`;
    return;
  }
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    const {data}=await sb.auth.getSession();
    if(data?.session?.user){
      const {data:profile}=await sb.from("user_profiles").select("role").eq("id",data.session.user.id).maybeSingle();
      if((profile?.role||"")==="master"){
        st.loggedIn=true;
        document.getElementById("tbUser").textContent=data.session.user.email;
        await loadData();
        resetInact();
      }
    }
  }catch(e){
    console.error("Init error:",e);
    st.err="Verbindungsfehler: "+e.message;
  }
  document.getElementById("loadingScreen").style.display="none";
  render();
});

async function masterLogin(){
  const em=(document.getElementById("mEmail")?.value||"").trim().toLowerCase();
  const p=(document.getElementById("mPass")?.value||"").trim();
  if(!sb){st.err="Supabase nicht verbunden";render();return;}
  if(!em||!p){st.err="Bitte E-Mail und Passwort eingeben";render();return;}
  try{
    const {data,error}=await sb.auth.signInWithPassword({email:em,password:p});
    if(error||!data?.user){st.err="Login fehlgeschlagen: "+(error?.message||"");render();return;}
    // Berechtigung prüfen: role=master in user_profiles
    const {data:profile}=await sb.from("user_profiles").select("role").eq("id",data.user.id).maybeSingle();
    if((profile?.role||"")!=="master"){
      try{await sb.auth.signOut();}catch(e){}
      st.err="Keine Berechtigung für diesen Bereich";render();return;
    }
    st.loggedIn=true;st.err="";
    document.getElementById("tbUser").textContent=data.user.email;
    await loadData();resetInact();render();
  }catch(e){
    st.err="Verbindungsfehler: "+e.message;render();
  }
}

async function masterLogout(){
  clearTimeout(_it);clearTimeout(_wt);clearInterval(_ci);
  const w=document.getElementById("inactWarn");if(w)w.remove();
  try{if(sb)await sb.auth.signOut();}catch(e){}
  st={loggedIn:false,tab:"users",users:[],selId:null,query:"",delConfirm:null,err:""};
  document.getElementById("tbUser").textContent="";
  render();
}

async function loadData(){
  if(!sb){st.err="Supabase nicht verbunden";return;}
  try{
    const {data:users,error}=await sb.from("user_profiles")
      .select("id,email,first_name,last_name,plan,is_beta,is_blocked,trial_end,address_street,address_zip,address_city,phone,admin_note,updated_at")
      .range(0,4999).order("updated_at",{ascending:false});
    if(error){st.err="Ladefehler: "+error.message;return;}
    st.users=users||[];
    st.err=st.users.length===0?"Keine Nutzer (RLS prüfen)":"";
    if(!st.selId&&st.users.length)st.selId=st.users[0].id;
    if(st.selId&&!st.users.some(u=>u.id===st.selId))st.selId=st.users[0]?.id||null;
  }catch(e){
    st.err="Netzwerkfehler: "+e.message;
  }
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const topbar=document.getElementById("topbar");
  topbar.style.display=st.loggedIn?"flex":"none";
  document.getElementById("root").innerHTML=st.loggedIn?rMain():rLogin();
}

function rLogin(){
  return `<div style="max-width:380px;margin:10vh auto 0">
    <div class="card" style="padding:28px">
      <p style="font-size:10px;font-weight:700;letter-spacing:1px;color:#86E8C0;margin:0 0 6px">PLANAVO</p>
      <h1 style="font-size:22px;font-weight:800;margin:0 0 4px">Master Admin</h1>
      <p style="font-size:13px;color:var(--tm);margin:0 0 22px">Interner Verwaltungszugang</p>
      ${st.err?`<p style="font-size:12px;color:var(--co);background:var(--coG);border-radius:10px;padding:10px 13px;margin:0 0 14px">${esc(st.err)}</p>`:""}
      <div class="field"><label>E-Mail</label><div class="iw"><input id="mEmail" type="email" placeholder="E-Mail Adresse" autocomplete="email"></div></div>
      <div class="field"><label>Passwort</label><div class="iw"><input id="mPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')masterLogin()"></div></div>
      <button class="btn btn-primary btn-full" onclick="masterLogin()">Anmelden</button>
    </div>
  </div>`;
}

function rMain(){
  const tabs=[{id:"users",icon:"👥",label:"Kunden"},{id:"create",icon:"＋",label:"Neu anlegen"},{id:"system",icon:"⚙",label:"System"}];
  const sidebar=`<div class="sidebar">
    <div style="padding-bottom:12px;border-bottom:1px solid var(--b);margin-bottom:6px">
      <p style="font-size:9px;font-weight:700;letter-spacing:1px;color:#86E8C0;margin:0 0 2px">ADMIN</p>
      <p style="font-size:14px;font-weight:800;margin:0">${st.users.length} Kunden</p>
    </div>
    ${tabs.map(t=>`<button class="nav-btn ${st.tab===t.id?"active":""}" onclick="st.tab='${t.id}';render()"><span style="font-size:15px;width:20px;text-align:center">${t.icon}</span>${t.label}</button>`).join("")}
    <div style="flex:1"></div>
    <div style="padding-top:12px;border-top:1px solid var(--b);margin-top:8px;display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-outline btn-sm btn-full" onclick="loadData().then(render)">↻ Aktualisieren</button>
      <button class="btn btn-danger btn-sm btn-full" onclick="masterLogout()">Logout</button>
    </div>
  </div>`;
  const views={users:rUsers(),create:rCreate(),system:rSystem()};
  return `<div class="shell">${sidebar}<div style="flex:1;min-width:0">
    ${st.err?`<div class="card" style="border-color:rgba(249,112,102,0.3);background:var(--coG);margin-bottom:12px;padding:12px 16px"><p style="font-size:13px;color:var(--co);margin:0">⚠ ${esc(st.err)}</p></div>`:""}
    ${views[st.tab]||views.users}
  </div></div>`;
}

// ── Users View ────────────────────────────────────────────────────────────
function rUsers(){
  const q=(st.query||"").trim().toLowerCase();
  const list=st.users.filter(u=>!q||`${u.first_name||""} ${u.last_name||""} ${u.email||""} ${u.plan||""}`.toLowerCase().includes(q));
  const sel=st.users.find(x=>x.id===st.selId)||null;

  const badge=(plan,beta)=>`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${plan==="Pro"?"var(--emG)":"var(--bgE)"};color:${plan==="Pro"?"var(--em)":"var(--ts)"};border:1px solid ${plan==="Pro"?"var(--ba)":"var(--b)"}">${plan||"Basic"}</span>${beta?`<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;background:rgba(134,232,192,0.12);color:#86E8C0;border:1px solid rgba(134,232,192,0.25);margin-left:4px">BETA</span>`:""}`;

  const userList=list.map(u=>{
    const isSel=st.selId===u.id;
    const name=([u.first_name||"",u.last_name||""].join(" ").trim()||u.email||"Nutzer");
    const blocked=!!(u.is_blocked);
    return `<div class="user-item ${isSel?"sel":""}" onclick="st.selId='${u.id}';render()">
      <div class="avatar" style="width:36px;height:36px;font-size:14px;background:${blocked?"var(--coG)":"linear-gradient(135deg,#059669,#34D399)"}">${blocked?"🚫":(name[0]||"?").toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:700;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${isSel?"var(--em)":"var(--t)"}">${esc(name)}</p>
        <p style="font-size:11px;color:var(--tm);margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.email||"–")}</p>
      </div>
      ${badge(u.plan,u.is_beta)}
    </div>`;
  }).join("")||`<p style="font-size:13px;color:var(--tm);padding:16px 0">Keine Nutzer.</p>`;

  // ── Detail card ──────────────────────────────────────────────────────
  let detail=`<div class="card" style="text-align:center;padding:48px 20px">
    <p style="font-size:36px;margin:0 0 12px">👈</p>
    <p style="font-size:15px;font-weight:700;margin:0 0 6px">Kunden auswählen</p>
    <p style="font-size:13px;color:var(--tm)">Klicke einen Kunden in der Liste</p>
  </div>`;

  if(sel){
    const blocked=!!(sel.is_blocked);
    const isDel=st.delConfirm===sel.id;
    const name=([sel.first_name||"",sel.last_name||""].join(" ").trim()||sel.email||"Nutzer");

    const tog=(label,sub,on,fn,onCol="#86E8C0")=>`<div class="tog-row">
      <div>
        <p style="font-size:13px;font-weight:700;margin:0">${label}</p>
        ${sub?`<p style="font-size:11px;color:var(--tm);margin:2px 0 0">${sub}</p>`:""}
      </div>
      <div class="tog-track" style="background:${on?onCol:"var(--b)"}" onclick="${fn}">
        <div class="tog-thumb" style="left:${on?"23px":"3px"}"></div>
      </div>
    </div>`;

    detail=`<div class="card" style="padding:20px">
      <div style="display:flex;align-items:center;gap:12px;padding-bottom:16px;margin-bottom:18px;border-bottom:1px solid var(--b)">
        <div class="avatar" style="width:50px;height:50px;border-radius:14px;font-size:18px;background:${blocked?"var(--coG)":"linear-gradient(135deg,#059669,#34D399)"}">${blocked?"🚫":(name[0]||"?").toUpperCase()}</div>
        <div style="flex:1">
          <p style="font-size:17px;font-weight:800;margin:0">${esc(name)}</p>
          <p style="font-size:12px;color:var(--tm);margin:3px 0 0">${esc(sel.email||"–")}</p>
          <div style="margin-top:6px">${badge(sel.plan,sel.is_beta)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openApp('${sel.id}')">👁 App öffnen</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="field" style="margin:0"><label>Vorname</label><div class="iw"><input id="muFirst-${sel.id}" value="${esc(sel.first_name||"")}"></div></div>
        <div class="field" style="margin:0"><label>Nachname</label><div class="iw"><input id="muLast-${sel.id}" value="${esc(sel.last_name||"")}"></div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 80px 1fr;gap:10px;margin-bottom:16px">
        <div class="field" style="margin:0"><label>Straße</label><div class="iw"><input id="muStreet-${sel.id}" value="${esc(sel.address_street||"")}"></div></div>
        <div class="field" style="margin:0"><label>PLZ</label><div class="iw"><input id="muZip-${sel.id}" value="${esc(sel.address_zip||"")}"></div></div>
        <div class="field" style="margin:0"><label>Ort</label><div class="iw"><input id="muCity-${sel.id}" value="${esc(sel.address_city||"")}"></div></div>
      </div>

      <p style="font-size:11px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px">Plan</p>
      <div style="display:flex;gap:6px;margin-bottom:16px">
        ${["Basic","Pro"].map(p=>`<button class="chip ${(sel.plan||"Basic")===p?"active":""}" style="flex:1;justify-content:center" onclick="setUserPlan('${sel.id}','${p}')">${p}</button>`).join("")}
      </div>

      ${tog("🧪 Beta-Nutzer","Alle Features inkl. Schulden-Assistent",!!(sel.is_beta),`toggleBeta('${sel.id}')`)}
      ${tog("🚫 Gesperrt","Kein Login möglich",blocked,`toggleBlock('${sel.id}')`,blocked?"#f87171":"#86E8C0")}

      <div class="field" style="margin:16px 0 0">
        <label>Admin-Notiz</label>
        <div class="iw"><input id="muNote-${sel.id}" value="${esc(sel.admin_note||"")}" placeholder="Interne Notiz…"></div>
      </div>

      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="saveUser('${sel.id}')">💾 Speichern</button>
        <button class="btn btn-outline btn-sm" onclick="passReset('${esc(sel.email||"")}')">📧 Passwort-Reset</button>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:12px;border-top:1px solid var(--b)">
        <button class="btn btn-outline btn-sm" onclick="resetState('${sel.id}')">🗑 Daten zurücksetzen</button>
        <button class="btn btn-danger btn-sm" style="${isDel?"background:var(--co);color:#fff;border-color:var(--co)":""}" onclick="delUser('${sel.id}')">${isDel?"⚠ Wirklich löschen?":"Account löschen"}</button>
        ${isDel?`<button class="btn btn-outline btn-sm" onclick="st.delConfirm=null;render()">Abbrechen</button>`:""}
      </div>
    </div>`;
  }

  return `<div>
    <h2 style="font-size:20px;font-weight:800;margin:0 0 16px">Kunden <span style="font-size:14px;font-weight:400;color:var(--tm)">${st.users.length} gesamt</span></h2>
    <div style="display:grid;grid-template-columns:290px 1fr;gap:14px;align-items:start">
      <div class="card" style="padding:10px">
        <div class="iw" style="margin-bottom:10px"><input placeholder="Suchen…" value="${esc(st.query||"")}" oninput="st.query=this.value;render()"></div>
        <div style="max-height:66vh;overflow-y:auto">${userList}</div>
      </div>
      ${detail}
    </div>
  </div>`;
}

// ── Create View ───────────────────────────────────────────────────────────
function rCreate(){
  return `<div>
    <h2 style="font-size:20px;font-weight:800;margin:0 0 16px">Neuen Kunden anlegen</h2>
    <div class="card" style="max-width:500px;padding:24px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>Vorname</label><div class="iw"><input id="mcFirst" placeholder="Max"></div></div>
        <div class="field"><label>Nachname</label><div class="iw"><input id="mcLast" placeholder="Mustermann"></div></div>
      </div>
      <div class="field"><label>E-Mail *</label><div class="iw"><input id="mcEmail" type="email" placeholder="max@example.com"></div></div>
      <div class="field"><label>Passwort * (min. 6 Zeichen)</label><div class="iw"><input id="mcPass" type="password" placeholder="••••••••"></div></div>
      <div class="field"><label>Plan</label><div class="iw">
        <select id="mcPlan"><option value="Basic">Basic</option><option value="Pro">Pro</option></select>
        <span style="color:var(--tm);pointer-events:none;padding-right:4px">▾</span>
      </div></div>
      <button class="btn btn-primary btn-full" onclick="createCustomer()">✓ Kunde anlegen</button>
    </div>
  </div>`;
}

// ── System View ───────────────────────────────────────────────────────────
function rSystem(){
  const rows=[
    ["Supabase",sb?"✓ Verbunden":"✗ Fehler",sb?"var(--em)":"var(--co)"],
    ["Session",st.loggedIn?"✓ Aktiv":"–",st.loggedIn?"var(--em)":"var(--tm)"],
    ["Kunden",st.users.length+" geladen","var(--em)"],
  ];
  return `<div>
    <h2 style="font-size:20px;font-weight:800;margin:0 0 16px">System</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card">
        <p style="font-size:13px;font-weight:700;margin:0 0 12px">Status</p>
        ${rows.map(([k,v,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-radius:10px;background:var(--bgE);border:1px solid var(--b);margin-bottom:8px">
          <span style="font-size:13px;color:var(--tm)">${k}</span>
          <span style="font-size:13px;font-weight:700;color:${c}">${v}</span>
        </div>`).join("")}
      </div>
      <div class="card">
        <p style="font-size:13px;font-weight:700;margin:0 0 12px">Aktionen</p>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-outline btn-sm btn-full" onclick="loadData().then(render);flash('Aktualisiert ✓')">↻ Daten neu laden</button>
          <button class="btn btn-ghost btn-sm btn-full" onclick="masterLogout()">Ausloggen</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────
async function saveUser(id){
  const g=k=>document.getElementById(`${k}-${id}`)?.value?.trim()||"";
  const u=st.users.find(x=>x.id===id);
  const {error}=await sb.from("user_profiles").upsert({
    id, first_name:g("muFirst")||null, last_name:g("muLast")||null,
    plan:u?.plan||"Basic", is_beta:!!(u?.is_beta), is_blocked:!!(u?.is_blocked),
    address_street:g("muStreet")||null, address_zip:g("muZip")||null, address_city:g("muCity")||null,
    admin_note:g("muNote")||null, updated_at:new Date().toISOString()
  });
  if(error){flash("Fehler: "+error.message);return;}
  // Update local state
  if(u){Object.assign(u,{first_name:g("muFirst"),last_name:g("muLast"),address_street:g("muStreet"),address_zip:g("muZip"),address_city:g("muCity"),admin_note:g("muNote")});}
  flash("Gespeichert ✓");
  await loadData();render();
}

async function setUserPlan(id,plan){
  const {error}=await sb.from("user_profiles").update({plan,updated_at:new Date().toISOString()}).eq("id",id);
  if(error){flash("Fehler: "+error.message);return;}
  const u=st.users.find(x=>x.id===id);if(u)u.plan=plan;
  flash(`Plan → ${plan} ✓`);render();
}

async function toggleBeta(id){
  const u=st.users.find(x=>x.id===id);if(!u)return;
  const v=!u.is_beta;
  const {error}=await sb.from("user_profiles").update({is_beta:v}).eq("id",id);
  if(error){flash("Fehler: "+error.message);return;}
  u.is_beta=v;flash(v?"🧪 Beta aktiviert ✓":"Beta deaktiviert");render();
}

async function toggleBlock(id){
  const u=st.users.find(x=>x.id===id);if(!u)return;
  const v=!u.is_blocked;
  const ok=await confirm2(v?"Nutzer sperren?":"Nutzer entsperren?",v?"Der Nutzer kann sich nicht mehr einloggen.":"Der Nutzer kann sich wieder einloggen.",v?"Sperren":"Entsperren");
  if(!ok)return;
  const {error}=await sb.from("user_profiles").update({is_blocked:v,updated_at:new Date().toISOString()}).eq("id",id);
  if(error){flash("Fehler: "+error.message);return;}
  u.is_blocked=v;flash(v?"Gesperrt 🔒":"Entsperrt ✓");render();
}

async function resetState(id){
  const ok=await confirm2("App-Daten zurücksetzen?","Schulden, Budget und Verträge werden gelöscht.","Zurücksetzen");
  if(!ok)return;
  const {error}=await sb.from("app_state").upsert({user_id:id,debts:[],budget_items:[],contracts:[],updated_at:new Date().toISOString()});
  if(error){flash("Fehler: "+error.message);return;}
  flash("Daten zurückgesetzt ✓");
}

async function delUser(id){
  if(st.delConfirm!==id){st.delConfirm=id;render();flash("⚠ Nochmals klicken zum Löschen");return;}
  st.delConfirm=null;
  try{
    const {error}=await sb.functions.invoke("hyper-api",{body:{action:"delete_user",user_id:id}});
    if(!error){flash("Komplett gelöscht ✓");await loadData();render();return;}
  }catch(e){}
  await Promise.all([sb.from("app_state").delete().eq("user_id",id),sb.from("user_profiles").delete().eq("id",id)]);
  if(st.selId===id)st.selId=null;
  flash("⚠ Profildaten gelöscht (Auth-User ggf. noch aktiv)");
  await loadData();render();
}

async function createCustomer(){
  const fn=(document.getElementById("mcFirst")?.value||"").trim();
  const ln=(document.getElementById("mcLast")?.value||"").trim();
  const em=(document.getElementById("mcEmail")?.value||"").trim().toLowerCase();
  const pw=(document.getElementById("mcPass")?.value||"").trim();
  const pl=(document.getElementById("mcPlan")?.value||"Basic");
  if(!em||!pw){flash("E-Mail und Passwort sind Pflicht");return;}
  if(pw.length<6){flash("Passwort min. 6 Zeichen");return;}
  const {data:sess}=await sb.auth.getSession();
  const mSess=sess?.session||null;
  const {data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{first_name:fn,last_name:ln,plan:pl}}});
  if(error){flash("Fehler: "+error.message);return;}
  const uid=data?.user?.id;
  if(!uid){flash("Angelegt, aber keine User-ID");return;}
  const trial=new Date();trial.setDate(trial.getDate()+30);
  await Promise.all([
    sb.from("user_profiles").upsert({id:uid,email:em,first_name:fn||null,last_name:ln||null,plan:pl,trial_end:trial.toISOString(),updated_at:new Date().toISOString()}),
    sb.from("app_state").upsert({user_id:uid,debts:[],budget_items:[],contracts:[],updated_at:new Date().toISOString()})
  ]);
  if(mSess?.access_token&&mSess?.refresh_token)try{await sb.auth.setSession({access_token:mSess.access_token,refresh_token:mSess.refresh_token});}catch(e){}
  ["mcFirst","mcLast","mcEmail","mcPass"].forEach(k=>{const el=document.getElementById(k);if(el)el.value="";});
  flash("Kunde angelegt ✓");await loadData();render();
}

async function passReset(email){
  if(!email){flash("Keine E-Mail");return;}
  const ok=await confirm2("Passwort-Reset senden?",`Reset-Link → ${email}`,"Senden");
  if(!ok)return;
  const {error}=await sb.auth.resetPasswordForEmail(email);
  if(error){flash("Fehler: "+error.message);return;}
  flash("Reset-Link gesendet 📧");
}

function openApp(uid){
  window.open(`app.html?impersonate=${uid}`,"_blank");
}
</script>

</html>
